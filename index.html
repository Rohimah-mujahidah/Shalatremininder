<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <title>Jadwal Sholat Premium</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#8c52ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8c52ff',
                        secondary: '#d099ff',
                    }

        }

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d099ff; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #8c52ff; }
        
        /* Custom Gradient for text and backgrounds */
        .text-gradient {
            background: linear-gradient(to right, #8c52ff, #d099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bg-gradient-feminine {
            background: linear-gradient(135deg, #8c52ff, #d099ff);
        }
        
        /* Custom Animations for Modal */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-50 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const IconMoon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const IconSunrise = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v6"/><path d="M8.4 10.4 4.2 6.2"/><path d="M15.6 10.4l4.2-4.2"/><path d="M22 18h-2"/><path d="M4 18H2"/><path d="M12 14v4"/><path d="M8 22h8"/></svg>;
        const IconSun = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const IconSunset = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 10v4"/><path d="M8.4 15.6 4.2 19.8"/><path d="M15.6 15.6l4.2 4.2"/><path d="M22 12h-2"/><path d="M4 12H2"/><path d="M12 2v4"/><path d="M8 22h8"/></svg>;
        const IconCloudMoon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 16a3 3 0 1 1 0-6H7a5 5 0 1 0 0 10h6a3 3 0 0 0 0-6Z"/><path d="M10.1 9.3a6 6 0 0 1 9.4 4.5"/></svg>;
        const IconClock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;
        const IconMapPin = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconInfo = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconSettings = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconVolume2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
        const IconVolumeX = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>;
        const IconX = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconPlay = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconSquare = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>;
        const IconUser = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconSearch = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconCompass = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;

        // --- UTILS ---
        const formatTimeDisplay = (hours, minutes) => `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        const parseTime = (timeStr, offsetDay = 0, baseDate = new Date()) => {
            if (!timeStr) return baseDate;
            const [hours, minutes, seconds = 0] = timeStr.split(':').map(Number);
            const d = new Date(baseDate.getTime());
            d.setHours(hours, minutes, seconds, 0);
            if (offsetDay !== 0) d.setDate(d.getDate() + offsetDay);
            return d;
        };
        const formatDuration = (ms) => {
            if (ms < 0) ms = 0;
            const hours = Math.floor(ms / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        };
        const adjustTimeString = (timeStr, offsetMinutes) => {
            if (!timeStr) return timeStr;
            const [h, m] = timeStr.split(':').map(Number);
            const d = new Date();
            d.setHours(h, m + (offsetMinutes || 0), 0, 0);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        };
        const getLocalTime = (tz) => { try { return new Date(new Date().toLocaleString('en-US', { timeZone: tz })); } catch (e) { return new Date(); } };
        const safeGetItem = (key, defaultValue) => {
            try { const item = localStorage.getItem(key); return item !== null ? JSON.parse(item) : defaultValue; } catch (error) { return defaultValue; }
        };
        
        // Kalkulasi Dhuha: Terbit matahari + 20 menit (Standar aman)
        const calculateDhuha = (sunriseTimeStr) => {
            if(!sunriseTimeStr) return "00:00";
            const [h, m] = sunriseTimeStr.split(':').map(Number);
            const d = new Date();
            d.setHours(h, m + 20, 0, 0);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        const PRAYER_QUOTES = {
            'isya_prev': "Waktu istirahat telah tiba. Tutup malam dengan zikir dan niat baik untuk esok hari.",
            'tahajjud': "Bangunlah di saat dunia tertidur. Jadikan sepertiga malam sebagai waktu terbaik untuk memohon.",
            'imsak': "Waktu menahan diri segera tiba. Sempurnakan niat puasamu dengan penuh keikhlasan.",
            'subuh': "Awali pagimu dengan kemenangan menundukkan kantuk demi meraih rida Sang Pencipta.",
            'syuruq': "Matahari mulai terbit. Tahan sejenak sujudmu hingga memasuki waktu Dhuha yang penuh berkah.",
            'dhuha': "Tautkan ikhtiar pagimu dengan Dhuha, jalan pembuka pintu rezeki dan ketenangan jiwa.",
            'dzuhur': "Di tengah kesibukan dunia, penuhi panggilan-Nya. Rehatkan raga, tenangkan jiwa dalam sujud.",
            'ashar': "Bersyukurlah dengan sholat Ashar, sebuah jeda penyejuk hati setelah hari yang penuh lelah.",
            'maghrib': "Tutup hari dengan rasa syukur. Sambut Maghrib sebagai waktu mustajab untuk berdoa.",
            'isya': "Sempurnakan amal harimu dengan Isya yang khusyuk sebelum mengistirahatkan raga sepenuhnya."
        };

        const App = () => {
            // STATE PREFERENCES
            const [userName, setUserName] = useState(() => safeGetItem('sholat_user_name', "Muslimah"));
            
            // STATE LOCATION & API SETTINGS
            const [searchCityInput, setSearchCityInput] = useState(() => safeGetItem('sholat_search_city', "Jakarta"));
            const [activeCity, setActiveCity] = useState(() => safeGetItem('sholat_search_city', "Jakarta"));
            const [cityTimezone, setCityTimezone] = useState("Asia/Jakarta");
            
            // 20 = Kemenag, 3 = MWL, 5 = Egypt, 2 = ISNA, 0 = Shia, 1 = Karachi, 4 = Umm Al-Qura
            const [calcMethod, setCalcMethod] = useState(() => safeGetItem('sholat_calc_method', 20)); 
            // 0 = Shafi'i (Standard), 1 = Hanafi
            const [asrMethod, setAsrMethod] = useState(() => safeGetItem('sholat_asr_method', 0)); 

            const [jadwal, setJadwal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [currentDateStr, setCurrentDateStr] = useState("");

            // STATE SETTINGS & AUDIO
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [audioEnabled, setAudioEnabled] = useState(() => safeGetItem('sholat_audio', true));
            const [offsets, setOffsets] = useState(() => safeGetItem('sholat_offsets', { imsak: 0, subuh: 0, terbit: 0, dhuha: 0, dzuhur: 0, ashar: 0, maghrib: 0, isya: 0 }));
            const [qomatDurations, setQomatDurations] = useState(() => safeGetItem('sholat_qomat', { subuh: 10, dzuhur: 10, ashar: 10, maghrib: 10, isya: 10 }));
            const [audioStatus, setAudioStatus] = useState("Menyiapkan audio...");
            const [isPlaying, setIsPlaying] = useState(false);
            const [prayerPopup, setPrayerPopup] = useState(null);

            // STATE TAHAJJUD
            const [tahajjudAlarmTime, setTahajjudAlarmTime] = useState(() => safeGetItem('sholat_tahajjud_time', "03:00"));
            const [tahajjudAlarmEnabled, setTahajjudAlarmEnabled] = useState(() => safeGetItem('sholat_tahajjud_enabled', false));
            const [tahajjudCustomAudio, setTahajjudCustomAudio] = useState(() => safeGetItem('sholat_tahajjud_audio', null));
            const [isTahajjudRinging, setIsTahajjudRinging] = useState(false);
            
            // STATE DETAIL MODAL
            const [selectedPrayerDetail, setSelectedPrayerDetail] = useState(null);
            
            // REFS
            const tahajjudAudioRef = useRef(null);
            const playedTahajjudRef = useRef(null);
            const playedAdzanRef = useRef(null);
            const isAudioUnlocked = useRef(false);
            const adzanAudioRef = useRef(null);

            const FALLBACK_URL = "https://rohimah-mujahidah.github.io/Shalatremininder/assets/audio/adzan2.mp3";

            useEffect(() => {
                const audio = new Audio();
                audio.preload = "auto";
                audio.src = FALLBACK_URL;
                
                audio.oncanplaythrough = () => setAudioStatus("Audio siap");
                audio.onerror = () => setAudioStatus("Error memuat audio.");
                audio.onplay = () => setIsPlaying(true);
                audio.onpause = () => setIsPlaying(false);
                audio.onended = () => setIsPlaying(false);

                adzanAudioRef.current = audio;

                const unlockAudio = () => {
                    if (!isAudioUnlocked.current && adzanAudioRef.current) {
                        const playPromise = adzanAudioRef.current.play();
                        if (playPromise !== undefined) {
                            playPromise.then(() => {
                                adzanAudioRef.current.pause();
                                adzanAudioRef.current.currentTime = 0;
                                isAudioUnlocked.current = true;
                            }).catch(e => {});
                        }
                    }
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                };
                document.addEventListener('click', unlockAudio);
                document.addEventListener('touchstart', unlockAudio);

                return () => {
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                };
            }, []);

            useEffect(() => {
                const audio = new Audio();
                audio.loop = true; 
                audio.src = tahajjudCustomAudio || "https://rohimah-mujahidah.github.io/Shalatremininder/assets/audio/tahajjud.mp3"; 
                tahajjudAudioRef.current = audio;
            }, [tahajjudCustomAudio]);

            const saveSetting = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} };

            // FETCH DATA DARI ALADHAN API
            const fetchJadwal = () => {
                if (!activeCity) return;
                setLoading(true);
                
                const d = new Date();
                const dateParam = `${d.getDate()}-${d.getMonth() + 1}-${d.getFullYear()}`;
                const url = `https://api.aladhan.com/v1/timingsByCity/${dateParam}?city=${encodeURIComponent(activeCity)}&country=Indonesia&method=${calcMethod}&school=${asrMethod}`;

                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        if (data.code === 200) {
                            const timings = data.data.timings;
                            const tz = data.data.meta.timezone;
                            
                            // Map Aladhan to App state
                            const mappedJadwal = {
                                tanggal: data.data.date.readable,
                                imsak: timings.Imsak.replace(" (WIB)", ""),
                                subuh: timings.Fajr.replace(" (WIB)", ""),
                                terbit: timings.Sunrise.replace(" (WIB)", ""),
                                dhuha: calculateDhuha(timings.Sunrise),
                                dzuhur: timings.Dhuhr.replace(" (WIB)", ""),
                                ashar: timings.Asr.replace(" (WIB)", ""),
                                maghrib: timings.Sunset.replace(" (WIB)", ""), // Using Sunset for precise Maghrib equivalent
                                isya: timings.Isha.replace(" (WIB)", "")
                            };
                            
                            setCityTimezone(tz);
                            setJadwal(mappedJadwal);
                            
                            const localNow = getLocalTime(tz);
                            setCurrentTime(localNow);
                            setCurrentDateStr(`${localNow.getFullYear()}/${localNow.getMonth()+1}/${localNow.getDate()}`);
                        } else {
                            alert("Kota tidak ditemukan atau terjadi kesalahan server.");
                        }
                        setLoading(false);
                    })
                    .catch(err => { 
                        setLoading(false); 
                        alert("Gagal mengambil data jadwal sholat. Periksa koneksi internet Anda.");
                    });
            };

            // Fetch on Mount & when Api Params change
            useEffect(() => {
                fetchJadwal();
            }, [activeCity, calcMethod, asrMethod]);

            const handleSearch = (e) => {
                e.preventDefault();
                if(searchCityInput.trim() !== "") {
                    setActiveCity(searchCityInput);
                    saveSetting('sholat_search_city', searchCityInput);
                }
            };

            const adjustedJadwal = useMemo(() => {
                if (!jadwal) return null;
                return {
                    ...jadwal,
                    imsak: adjustTimeString(jadwal.imsak, offsets.imsak),
                    subuh: adjustTimeString(jadwal.subuh, offsets.subuh),
                    terbit: adjustTimeString(jadwal.terbit, offsets.terbit),
                    dhuha: adjustTimeString(jadwal.dhuha, offsets.dhuha),
                    dzuhur: adjustTimeString(jadwal.dzuhur, offsets.dzuhur),
                    ashar: adjustTimeString(jadwal.ashar, offsets.ashar),
                    maghrib: adjustTimeString(jadwal.maghrib, offsets.maghrib),
                    isya: adjustTimeString(jadwal.isya, offsets.isya),
                };
            }, [jadwal, offsets]);

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = getLocalTime(cityTimezone);
                    setCurrentTime(now);

                    const newDateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
                    setCurrentDateStr(prev => (prev !== newDateStr) ? newDateStr : prev);

                    if (adjustedJadwal) {
                        const currentHHMM = formatTimeDisplay(now.getHours(), now.getMinutes());
                        const isWajibAdzan = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'].find(
                            key => adjustedJadwal[key] === currentHHMM
                        );
                        
                        if (isWajibAdzan) {
                            const adzanId = `${newDateStr}-${isWajibAdzan}`;
                            if (playedAdzanRef.current !== adzanId && now.getSeconds() < 10) {
                                playedAdzanRef.current = adzanId; 
                                setPrayerPopup({ id: isWajibAdzan, name: isWajibAdzan });

                                if (audioEnabled && adzanAudioRef.current) {
                                    adzanAudioRef.current.currentTime = 0;
                                    const playPromise = adzanAudioRef.current.play();
                                    if (playPromise !== undefined) {
                                        playPromise.catch(error => setAudioStatus("Tertahan keamanan browser."));
                                    }
                                }
                            }
                        }
                    }

                    if (tahajjudAlarmEnabled) {
                        const currentHHMM = formatTimeDisplay(now.getHours(), now.getMinutes());
                        const alarmId = `${newDateStr}-${tahajjudAlarmTime}`;

                        if (currentHHMM === tahajjudAlarmTime && now.getSeconds() === 0) {
                            if (playedTahajjudRef.current !== alarmId) {
                                playedTahajjudRef.current = alarmId;
                                setIsTahajjudRinging(true);
                                if (tahajjudAudioRef.current) {
                                    tahajjudAudioRef.current.currentTime = 0;
                                    tahajjudAudioRef.current.play().catch(e => console.log("Tertahan OS."));
                                }
                            }
                        }
                    }
                }, 1000); 
                return () => clearInterval(timer);
            }, [cityTimezone, adjustedJadwal, audioEnabled, tahajjudAlarmEnabled, tahajjudAlarmTime]);

            const toggleAudio = () => {
                if (adzanAudioRef.current) {
                    if (!adzanAudioRef.current.paused) {
                        adzanAudioRef.current.pause();
                        adzanAudioRef.current.currentTime = 0;
                    } else {
                        adzanAudioRef.current.currentTime = 0;
                        adzanAudioRef.current.play().catch(e => setAudioStatus("Error: " + e.message));
                    }
                }
            };

            const stopPrayerPopup = () => {
                setPrayerPopup(null);
                if (adzanAudioRef.current && !adzanAudioRef.current.paused) {
                    adzanAudioRef.current.pause();
                    adzanAudioRef.current.currentTime = 0;
                }
                setIsPlaying(false);
            };

            const handleTahajjudUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 4 * 1024 * 1024) { alert("Maksimal 4MB."); return; }
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64String = reader.result;
                    try {
                        localStorage.setItem('sholat_tahajjud_audio', JSON.stringify(base64String));
                        setTahajjudCustomAudio(base64String);
                        alert("Audio tersimpan!");
                    } catch (error) { alert("Gagal. Memori penuh."); }
                };
                reader.readAsDataURL(file);
            };

            const isDayTime = useMemo(() => {
                if (!adjustedJadwal) return true;
                const base = getLocalTime(cityTimezone);
                const terbit = parseTime(adjustedJadwal.terbit, 0, base);
                const maghrib = parseTime(adjustedJadwal.maghrib, 0, base);
                return currentTime >= terbit && currentTime < maghrib;
            }, [currentTime, adjustedJadwal, cityTimezone]);

            const displayDate = useMemo(() => {
                try {
                    return new Intl.DateTimeFormat('id-ID', {

                                                onClick={() => setSelectedPrayerDetail(card.id)}
                                                className={`cursor-pointer group relative overflow-hidden rounded-xl md:rounded-2xl p-4 md:p-5 border transition-all duration-500 transform hover:-translate-y-1 hover:shadow-[0_10px_30px_rgb(208,153,255,0.2)] ${isActive ? `${activeStyle} sm:scale-105 z-10` : `${theme.card}`}`}
                                            >
                                                {isActive && (
                                                    <span className="absolute top-2 right-2 flex h-2.5 w-2.5 md:h-3 md:w-3">
                                                        <span className={`animate-ping absolute inline-flex h-full w-full rounded-full ${card.isHaram ? 'bg-rose-400' : 'bg-secondary'} opacity-75`}></span>
                                                        <span className={`relative inline-flex rounded-full h-2.5 w-2.5 md:h-3 md:w-3 ${card.isHaram ? 'bg-rose-500' : 'bg-primary'}`}></span>
                                                    </span>
                                                )}
                                                
                                                <div className={`mb-3 md:mb-4 w-10 h-10 md:w-12 md:h-12 rounded-lg md:rounded-xl flex items-center justify-center transition-all duration-500 group-hover:scale-110 ${isActive ? (card.isHaram ? 'bg-rose-500/20 text-rose-500' : 'bg-gradient-feminine text-white shadow-md') : `bg-fuchsia-500/10 ${theme.textMuted} group-hover:bg-primary/20 group-hover:text-primary`}`}>
                                                    <card.icon className="w-5 h-5 md:w-6 md:h-6" />
                                                </div>
                                                
                                                <h4 className={`text-sm md:text-lg font-semibold mb-1 transition-colors duration-500 ${isActive ? (isDayTime ? 'text-primary' : 'text-fuchsia-100') : theme.text}`}>{card.title}</h4>
                                                <div className="flex items-end gap-2 mb-1 md:mb-2">
                                                    <span className={`text-2xl sm:text-3xl font-bold font-mono tracking-tight transition-colors duration-500 ${isActive ? (isDayTime ? 'text-slate-800' : 'text-white') : theme.text}`}>{card.time}</span>
                                                </div>
                                                
                                                {isActive && (
                                                    <div className="absolute bottom-0 left-0 h-1 md:h-1.5 bg-black/5 w-full">
                                                        <div className={`h-full ${card.isHaram ? 'bg-rose-500' : 'bg-gradient-feminine'}`} style={{width: `${progress}%`}}></div>
                                                    </div>
                                                )}
                                                
                                                {/* Hint Info Icon on Hover */}
                                                <div className="absolute bottom-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                                    <IconInfo className={`w-4 h-4 ${isActive ? (card.isHaram ? 'text-rose-400' : 'text-primary') : 'text-primary/50'}`} />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        {/* MODAL DETAIL WAKTU SHOLAT (INFO & DALIL) */}
                        {selectedPrayerDetail && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-[#1a1128]/80 backdrop-blur-md animate-[fadeIn_0.3s_ease-out_forwards]" onClick={(e) => { if(e.target === e.currentTarget) setSelectedPrayerDetail(null); }}>
                                <div className={`${theme.panel} border w-full max-w-xl rounded-3xl p-6 md:p-8 relative shadow-2xl animate-[scaleIn_0.3s_ease-out_forwards] overflow-hidden`}>
                                    
                                    {/* Abstract Decoration */}
                                    <div className="absolute -top-32 -right-32 w-64 h-64 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>
                                    <div className="absolute -bottom-32 -left-32 w-64 h-64 bg-secondary/20 rounded-full blur-3xl pointer-events-none"></div>
                                    
                                    <button onClick={() => setSelectedPrayerDetail(null)} className={`absolute top-4 right-4 p-2 rounded-full hover:bg-fuchsia-500/20 transition-colors z-10 ${theme.text}`}>
                                        <IconX className="w-6 h-6" />
                                    </button>

                                    <div className="relative z-10">
                                        <div className={`mb-5 w-12 h-12 md:w-16 md:h-16 rounded-2xl flex items-center justify-center shadow-lg bg-gradient-feminine text-white`}>
                                            {(() => {
                                                const IconCard = cardsData.find(c => c.id === selectedPrayerDetail)?.icon || IconClock;
                                                return <IconCard className="w-6 h-6 md:w-8 md:h-8" />;
                                            })()}
                                        </div>

                                        <h2 className="text-2xl md:text-3xl font-bold mb-2 text-gradient">
                                            {prayerDetailsData[selectedPrayerDetail].title}
                                        </h2>
                                        
                                        <div className={`text-xs md:text-sm font-semibold px-4 py-1.5 rounded-full inline-flex items-center gap-2 mb-6 border ${theme.border} bg-fuchsia-500/10 ${theme.text}`}>
                                            <IconClock className="w-4 h-4 text-primary" />
                                            Rentang: {cardsData.find(c => c.id === selectedPrayerDetail)?.time} - {cardsData.find(c => c.id === selectedPrayerDetail)?.end} {cityTimezone === 'Asia/Jakarta' ? 'WIB' : (cityTimezone === 'Asia/Makassar' ? 'WITA' : 'WIT')}
                                        </div>

                                        <div className="space-y-5">
                                            <div>
                                                <h4 className={`text-sm font-bold flex items-center gap-2 ${theme.text}`}><IconSunrise className="w-4 h-4 text-secondary" /> Definisi Rentang Waktu</h4>
                                                <p className={`text-sm md:text-base mt-1.5 leading-relaxed ${theme.textMuted} ${selectedPrayerDetail === 'ashar' && asrMethod == 1 ? 'font-semibold text-rose-400' : ''}`}>
                                                    {prayerDetailsData[selectedPrayerDetail].timeFrame}
                                                </p>
                                            </div>
                                            
                                            <div>
                                                <h4 className={`text-sm font-bold flex items-center gap-2 ${theme.text}`}><IconInfo className="w-4 h-4 text-primary" /> Penjelasan</h4>
                                                <p className={`text-sm md:text-base mt-1.5 leading-relaxed ${theme.textMuted}`}>
                                                    {prayerDetailsData[selectedPrayerDetail].description}
                                                </p>
                                            </div>

                                            <div className={`p-4 md:p-5 rounded-2xl border ${theme.border} bg-fuchsia-500/5 mt-6 shadow-inner`}>
                                                <h4 className={`text-xs md:text-sm font-bold mb-2 ${theme.text} uppercase tracking-wider opacity-80`}>Dalil Dasar Penentuan Waktu</h4>
                                                <blockquote className={`text-sm md:text-base italic leading-relaxed ${theme.textMuted} border-l-4 border-primary pl-4 py-1`}>
                                                    {prayerDetailsData[selectedPrayerDetail].dalil}
                                                </blockquote>
                                                <div className="flex justify-end mt-3">
                                                    <span className={`text-[10px] md:text-xs font-bold px-3 py-1 bg-primary/10 text-primary rounded-lg border border-primary/20`}>
                                                        Sumber: {prayerDetailsData[selectedPrayerDetail].source}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL SETTINGS TEMA FEMINIM */}
                        {isSettingsOpen && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#1a1128]/80 backdrop-blur-sm p-4">
                                <div className={`${theme.panel} border w-full max-w-2xl rounded-2xl md:rounded-3xl p-6 md:p-8 max-h-[90vh] overflow-y-auto relative shadow-2xl`}>
                                    <button onClick={() => setIsSettingsOpen(false)} className={`absolute top-4 right-4 p-2 rounded-full hover:bg-fuchsia-500/20 transition-colors ${theme.text}`}>
                                        <IconX className="w-6 h-6" />
                                    </button>

                                    <h2 className={`text-xl md:text-2xl font-bold mb-6 flex items-center gap-3 text-gradient border-b ${theme.border} pb-4`}>
                                        <IconSettings className="w-7 h-7 text-primary" /> Pengaturan Profesional
                                    </h2>

                                    <div className="grid md:grid-cols-2 gap-6">
                                        {/* KOLOM KIRI: Identitas & API */}
                                        <div className="space-y-6">
                                            <div>
                                                <h3 className={`font-semibold ${theme.text} mb-2 flex items-center gap-2 text-sm md:text-base`}><IconUser className="w-4 h-4 text-primary" /> Sapaan Personal</h3>
                                                <input 
                                                    type="text" value={userName} 
                                                    onChange={(e) => { setUserName(e.target.value); saveSetting('sholat_user_name', e.target.value); }}
                                                    className={`w-full ${theme.inputBg} rounded-lg px-4 py-2.5 border text-sm`}
                                                />
                                            </div>

                                            <div className={`p-4 rounded-xl border ${theme.border} bg-fuchsia-500/5`}>
                                                <h3 className={`font-semibold ${theme.text} mb-4 flex items-center gap-2 text-sm md:text-base`}><IconCompass className="w-4 h-4 text-primary" /> Metode Penghitungan</h3>
                                                
                                                <div className="mb-4">
                                                    <label className={`block text-xs ${theme.textMuted} mb-1.5`}>Metode Utama (Subuh, Isya, dll)</label>
                                                    <select 
                                                        value={calcMethod} 
                                                        onChange={(e) => { setCalcMethod(e.target.value); saveSetting('sholat_calc_method', e.target.value); }}
                                                        className={`w-full ${theme.inputBg} rounded-lg px-3 py-2 border text-sm font-medium`}
                                                    >
                                                        <option value="20">Kemenag RI (Indonesia)</option>
                                                        <option value="3">Muslim World League (MWL)</option>
                                                        <option value="5">Egyptian General Authority of Survey</option>
                                                        <option value="2">Islamic Society of North America (ISNA)</option>
                                                        <option value="0">Shia Ithna-Ashari (Leva, Qum)</option>
                                                        <option value="1">University of Islamic Sciences, Karachi</option>
                                                        <option value="4">Umm Al-Qura University, Makkah</option>
                                                    </select>
                                                </div>

                                                <div>
                                                    <label className={`block text-xs ${theme.textMuted} mb-1.5`}>Metode Asar</label>
                                                    <select 
                                                        value={asrMethod} 
                                                        onChange={(e) => { setAsrMethod(e.target.value); saveSetting('sholat_asr_method', e.target.value); }}
                                                        className={`w-full ${theme.inputBg} rounded-lg px-3 py-2 border text-sm font-medium`}
                                                    >
                                                        <option value="0">Mazhab Syafii, Maliki, Hambali (Standar)</option>
                                                        <option value="1">Mazhab Hanafi (Bayangan 2x Lipat)</option>
                                                    </select>
                                                </div>
                                                <p className={`text-[10px] mt-2 ${theme.textMuted} italic`}>*Perubahan metode akan memuat ulang jadwal secara otomatis.</p>
                                            </div>
                                        </div>

                                        {/* KOLOM KANAN: Alarm & Audio */}
                                        <div className="space-y-6">
                                            <div className={`p-4 rounded-xl border ${theme.border} bg-fuchsia-500/5`}>
                                                <div className="flex justify-between items-center mb-4">
                                                    <div>
                                                        <h3 className={`font-semibold ${theme.text} flex items-center gap-2 text-sm md:text-base`}>
                                                            {audioEnabled ? <IconVolume2 className="w-5 h-5 text-primary" /> : <IconVolumeX className="w-5 h-5 text-rose-500" />} Suara Adzan
                                                        </h3>
                                                    </div>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" className="sr-only peer" checked={audioEnabled} onChange={(e) => { setAudioEnabled(e.target.checked); saveSetting('sholat_audio', e.target.checked); }} />
                                                        <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                                    </label>
                                                </div>
                                                <button onClick={toggleAudio} className={`w-full flex items-center justify-center gap-2 ${isPlaying ? 'bg-rose-500 hover:bg-rose-600' : 'bg-primary hover:bg-secondary'} text-white py-2 rounded-lg text-sm font-medium transition-colors`}>
                                                    {isPlaying ? <IconSquare className="w-4 h-4" /> : <IconPlay className="w-4 h-4" />} {isPlaying ? "Hentikan" : "Test Suara"}
                                                </button>
                                            </div>

                                            <div className={`p-4 rounded-xl border ${theme.border} bg-fuchsia-500/5`}>
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className={`font-semibold ${theme.text} flex items-center gap-2 text-sm md:text-base`}><IconMoon className="w-5 h-5 text-secondary" /> Alarm Tahajjud</h3>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" className="sr-only peer" checked={tahajjudAlarmEnabled} onChange={(e) => { setTahajjudAlarmEnabled(e.target.checked); saveSetting('sholat_tahajjud_enabled', e.target.checked); }} />
                                                        <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
                                                    </label>
                                                </div>
                                                <input 
                                                    type="time" value={tahajjudAlarmTime} 
                                                    onChange={(e) => { setTahajjudAlarmTime(e.target.value); saveSetting('sholat_tahajjud_time', e.target.value); }}
                                                    className={`w-full mb-3 ${theme.inputBg} rounded-md px-3 py-2 border text-sm`}
                                                />
                                                <input 
                                                    type="file" accept="audio/*" onChange={handleTahajjudUpload}
                                                    className={`w-full ${theme.inputBg} rounded-md px-2 py-1.5 border text-xs file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-fuchsia-100 file:text-primary cursor-pointer`}
                                                />
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* BOTTOM: Koreksi Waktu */}
                                    <div className="mt-6 border-t border-fuchsia-500/20 pt-6">
                                        <details className="group">
                                            <summary className={`font-semibold ${theme.text} cursor-pointer list-none flex items-center justify-between text-sm md:text-base p-2 hover:bg-fuchsia-500/5 rounded-lg`}>
                                                <span className="flex items-center gap-2"><IconClock className="w-4 h-4 text-primary"/> Koreksi Manual & Timer Iqomah</span>
                                                <span className="transition group-open:rotate-180">▼</span>
                                            </summary>
                                            <div className="grid md:grid-cols-2 gap-6 mt-4 p-2">
                                                <div>
                                                    <h4 className={`text-xs font-semibold ${theme.textMuted} mb-3`}>Koreksi Jadwal (Menit +/-)</h4>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {['imsak', 'subuh', 'terbit', 'dhuha', 'dzuhur', 'ashar', 'maghrib', 'isya'].map(key => (
                                                            <div key={key} className={`flex items-center justify-between p-2 rounded-lg border ${theme.border} bg-fuchsia-500/5`}>
                                                                <span className={`text-[10px] md:text-xs capitalize font-medium ${theme.text}`}>{key}</span>
                                                                <input 
                                                                    type="number" value={offsets[key]} 
                                                                    onChange={(e) => { const newOff = {...offsets, [key]: parseInt(e.target.value)||0}; setOffsets(newOff); saveSetting('sholat_offsets', newOff); }}
                                                                    className={`w-12 p-1 text-center rounded border ${theme.inputBg} text-xs font-bold`}
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 className={`text-xs font-semibold ${theme.textMuted} mb-3`}>Jeda Iqomah (Menit)</h4>
                                                    <div className="grid grid-cols-1 gap-2">
                                                        {['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'].map(key => (
                                                            <div key={key} className={`flex items-center justify-between p-2 rounded-lg border ${theme.border} bg-fuchsia-500/5`}>
                                                                <span className={`text-[10px] md:text-xs capitalize font-medium ${theme.text}`}>{key}</span>
                                                                <input 
                                                                    type="number" min="0" value={qomatDurations[key]} 
                                                                    onChange={(e) => { const newQmt = {...qomatDurations, [key]: Math.max(0, parseInt(e.target.value)||0)}; setQomatDurations(newQmt); saveSetting('sholat_qomat', newQmt); }}
                                                                    className={`w-16 p-1 text-center rounded border ${theme.inputBg} text-xs font-bold`}
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </details>
                                    </div>

                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
